<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dark gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d27;stop-opacity:1" />
    </linearGradient>
    <!-- Purple glow -->
    <radialGradient id="glow1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
    <!-- Blue glow -->
    <radialGradient id="glow2" cx="75%" cy="65%" r="45%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    <!-- Card gradient -->
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#252840" />
      <stop offset="100%" style="stop-color:#1e2130" />
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1f40" />
      <stop offset="100%" style="stop-color:#1e1a30" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow1)" />
  <rect width="1200" height="630" fill="url(#glow2)" />

  <!-- Grid dots pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#2d3148" opacity="0.6"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Decorative floating cards (background) -->
  <!-- Card far left, rotated -->
  <g transform="translate(80, 160) rotate(-12)">
    <rect width="180" height="110" rx="14" fill="url(#card1)" stroke="#2d3148" stroke-width="1.5" filter="url(#shadow)" opacity="0.6"/>
    <rect x="16" y="20" width="80" height="8" rx="4" fill="#3d4170" opacity="0.8"/>
    <rect x="16" y="36" width="148" height="6" rx="3" fill="#2d3148" opacity="0.9"/>
    <rect x="16" y="48" width="120" height="6" rx="3" fill="#2d3148" opacity="0.7"/>
    <rect x="16" y="60" width="135" height="6" rx="3" fill="#2d3148" opacity="0.5"/>
  </g>

  <!-- Card far right, rotated -->
  <g transform="translate(960, 80) rotate(8)">
    <rect width="200" height="120" rx="14" fill="url(#card2)" stroke="#3d2d5a" stroke-width="1.5" filter="url(#shadow)" opacity="0.6"/>
    <rect x="16" y="20" width="90" height="8" rx="4" fill="#5a3d8a" opacity="0.8"/>
    <rect x="16" y="36" width="168" height="6" rx="3" fill="#3d2d5a" opacity="0.9"/>
    <rect x="16" y="48" width="140" height="6" rx="3" fill="#3d2d5a" opacity="0.7"/>
    <rect x="16" y="60" width="155" height="6" rx="3" fill="#3d2d5a" opacity="0.5"/>
  </g>

  <!-- Card bottom right -->
  <g transform="translate(980, 430) rotate(-6)">
    <rect width="190" height="115" rx="14" fill="url(#card1)" stroke="#2d3148" stroke-width="1.5" filter="url(#shadow)" opacity="0.5"/>
    <rect x="16" y="20" width="75" height="8" rx="4" fill="#3d4170" opacity="0.8"/>
    <rect x="16" y="36" width="158" height="6" rx="3" fill="#2d3148" opacity="0.9"/>
    <rect x="16" y="48" width="130" height="6" rx="3" fill="#2d3148" opacity="0.7"/>
  </g>

  <!-- Main center card -->
  <g transform="translate(660, 140)" filter="url(#shadow)">
    <rect width="430" height="260" rx="22" fill="#1e2130" stroke="#2d3148" stroke-width="1.5"/>
    <!-- Card header bar -->
    <rect width="430" height="52" rx="22" fill="#252840"/>
    <rect x="0" y="30" width="430" height="22" fill="#252840"/>
    <text x="20" y="33" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6366f1" letter-spacing="1.5">FRAGE</text>
    <!-- Question text -->
    <text x="20" y="78" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Was ist Spaced Repetition?</text>
    <!-- Divider -->
    <line x1="20" y1="98" x2="410" y2="98" stroke="#2d3148" stroke-width="1"/>
    <text x="20" y="118" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b5cf6" letter-spacing="1.5">ANTWORT</text>
    <!-- Answer lines -->
    <rect x="20" y="128" width="360" height="7" rx="3.5" fill="#2d3148"/>
    <rect x="20" y="143" width="300" height="7" rx="3.5" fill="#2d3148"/>
    <rect x="20" y="158" width="330" height="7" rx="3.5" fill="#2d3148"/>
    <!-- Rating buttons -->
    <g transform="translate(20, 195)">
      <rect width="85" height="34" rx="10" fill="#1a3a1a" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
      <text x="42.5" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">😊 Gut</text>
    </g>
    <g transform="translate(115, 195)">
      <rect width="85" height="34" rx="10" fill="#1a2a3a" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
      <text x="42.5" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">🤔 Ok</text>
    </g>
    <g transform="translate(210, 195)">
      <rect width="85" height="34" rx="10" fill="#3a1a1a" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
      <text x="42.5" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">😅 Nein</text>
    </g>
    <!-- AI sparkle badge -->
    <g transform="translate(320, 193)">
      <rect width="90" height="34" rx="10" fill="#3b1f6b" stroke="#8b5cf6" stroke-width="1"/>
      <text x="45" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle">✨ KI Fix</text>
    </g>
  </g>

  <!-- Left side: main text content -->
  <g transform="translate(80, 240)">
    <!-- Sparkle icon bg -->
    <circle cx="42" cy="42" r="42" fill="#1e1a30" stroke="#3d2d5a" stroke-width="1.5"/>
    <text x="42" y="57" font-family="Inter, system-ui, sans-serif" font-size="36" text-anchor="middle">✨</text>

    <!-- Brand name -->
    <text x="0" y="130" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">Sebi AI</text>

    <!-- Tagline -->
    <text x="0" y="170" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#9ca3af">KI-gestützte Prüfungsvorbereitung</text>

    <!-- Feature pills -->
    <g transform="translate(0, 200)">
      <rect width="155" height="36" rx="18" fill="#1e2130" stroke="#6366f1" stroke-width="1.5"/>
      <text x="78" y="23" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#818cf8" text-anchor="middle">🧠 Spaced Repetition</text>
    </g>
    <g transform="translate(170, 200)">
      <rect width="130" height="36" rx="18" fill="#1e2130" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="65" y="23" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">✨ Gemini KI</text>
    </g>
    <g transform="translate(315, 200)">
      <rect width="130" height="36" rx="18" fill="#1e2130" stroke="#22c55e" stroke-width="1.5"/>
      <text x="65" y="23" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4ade80" text-anchor="middle">📝 Exam-Modus</text>
    </g>
  </g>

  <!-- Bottom gradient fade -->
  <linearGradient id="fade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#0f1117;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#0f1117;stop-opacity:0.4"/>
  </linearGradient>
  <rect width="1200" height="630" fill="url(#fade)"/>

  <!-- Top border accent line -->
  <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
    <stop offset="30%" style="stop-color:#6366f1;stop-opacity:1"/>
    <stop offset="70%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
  </linearGradient>
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent-line)"/>
</svg>
